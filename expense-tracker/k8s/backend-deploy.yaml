apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-backend
  labels:
    app: expense-tracker-backend
spec:
  replicas: 1
  selector:     
    matchLabels:
      app: expense-tracker-backend
  template:
    metadata:
      labels:
        app: expense-tracker-backend
    spec:
      containers:   
        - name: expense-tracker-backend
          image: mycloudhub/expense-backend:1.0
          env:
            - name: DATABASE_URL
              value: postgresql://admin:secret@postgres-service:5432/expenses
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service       
metadata:
  name: expense-tracker-backend-service
spec:
  selector:   
    app: expense-tracker-backend
  ports:    
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP   
  