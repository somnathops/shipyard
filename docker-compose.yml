services:
  postgres:
    image: postgres:15-alpine
    container_name: expense-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d expenses"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: mycloudhub/expense-backend:${IMAGE_TAG}
    container_name: expense-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: mycloudhub/expense-frontend:${IMAGE_TAG}
    container_name: expense-ui
    environment:
      API_URL: http://backend:8080
      TZ: Asia/Kolkata
    ports:
      - "8502:8501"
    depends_on:
      - backend
    restart: on-failure

volumes:
  pgdata:
