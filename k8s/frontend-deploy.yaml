apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-frontend
  labels:
    app: expense-tracker-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-tracker-frontend
  template:
    metadata:
      labels:
        app: expense-tracker-frontend
    spec:
      containers:
        - name: expense-tracker-frontend
          image: mycloudhub/expense-frontend:1.0
          env:                        # ← add here (inside Deployment)
            - name: API_URL
              value: http://expense-tracker-backend-service:8080
          ports:
            - containerPort: 8501

---
apiVersion: v1
kind: Service
metadata:
  name: expense-tracker-frontend-service
spec:
  selector:
    app: expense-tracker-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
      nodePort: 30080
  type: NodePort
